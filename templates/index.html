<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenComms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div id="app">
  <!-- AUTH VIEW -->
  <div id="view-auth" class="view active">
    <div class="auth-container">
      <div class="logo">
        <span class="logo-icon">▼</span>
        <span class="logo-text">OpenComms</span>
      </div>
      <p class="tagline">encrypted. ephemeral. yours.</p>

      <div class="tab-bar">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <div id="tab-login" class="tab-content active">
        <div class="field">
          <label>Name</label>
          <input type="text" id="login-name" placeholder="dein name" autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-pw" placeholder="••••••••">
        </div>
        <div id="login-error" class="error-msg"></div>
        <button class="btn-primary" id="btn-login">Login →</button>
      </div>

      <div id="tab-register" class="tab-content">
        <div class="field">
          <label>Name</label>
          <input type="text" id="reg-name" placeholder="wähle einen namen" autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-pw" placeholder="••••••••">
        </div>
        <div id="reg-error" class="error-msg"></div>
        <button class="btn-primary" id="btn-register">Create Account →</button>
      </div>
    </div>
  </div>

  <!-- LOBBY VIEW -->
  <div id="view-lobby" class="view">
    <div class="navbar">
      <div class="nav-logo">▼ OpenComms</div>
      <div class="nav-right">
        <span id="nav-user" class="nav-user"></span>
        <button class="btn-ghost" id="btn-logout">Logout</button>
      </div>
    </div>

    <div class="lobby-content">
      <div class="lobby-header">
        <h1>Chatrooms</h1>
        <button class="btn-primary sm" id="btn-open-create">+ New Room</button>
      </div>

      <div id="rooms-list" class="rooms-list">
        <div class="empty-state">No Rooms yet.</div>
      </div>
    </div>

    <!-- JOIN MODAL -->
    <div id="modal-join" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title">Join Room</div>
        <div class="modal-room-id" id="modal-join-id"></div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="join-pw" placeholder="••••••••">
        </div>
        <div id="join-error" class="error-msg"></div>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-join-cancel">Cancel</button>
          <button class="btn-primary" id="btn-join-confirm">Join →</button>
        </div>
      </div>
    </div>

    <!-- CREATE MODAL -->
    <div id="modal-create" class="modal hidden">
      <div class="modal-box">
        <div class="modal-title">Create Room</div>
        <div class="field">
          <label>Name</label>
          <input type="text" id="create-name" placeholder="room name" autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="create-pw" placeholder="••••••••">
        </div>
        <div id="create-error" class="error-msg"></div>
        <div class="modal-actions">
          <button class="btn-ghost" id="btn-create-cancel">Cancel</button>
          <button class="btn-primary" id="btn-create-confirm">Create →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="view-chat" class="view">
    <div class="chat-navbar">
      <button class="btn-ghost icon" id="btn-back">←</button>
      <div class="chat-info">
        <span id="chat-room-name" class="chat-room-name"></span>
        <span id="chat-room-id" class="chat-room-id"></span>
      </div>
    </div>
    <div id="messages" class="messages"></div>
    <div class="chat-input-bar">
      <input type="text" id="msg-input" placeholder="Nachricht schreiben..." autocomplete="off">
      <button class="btn-send" id="btn-send">↑</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
